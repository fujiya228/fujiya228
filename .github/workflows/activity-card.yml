name: Activity Card

on:
  schedule: # daily at 02:00 UTC (11:00 JST)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  activity:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate activity cards
        env:
          # PAT: the default repo-scoped GITHUB_TOKEN 403s on cross-repo user queries
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        # writes activity.svg + activity-all.svg and updates the cached daily history JSON
        run: node .github/scripts/generate-activity.mjs "${{ github.repository_owner }}"
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add activity.svg activity-all.svg .github/data/contributions/
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh activity cards [skip ci]"
            git pull --rebase --autostash
            git push
          else
            echo "no change"
          fi
