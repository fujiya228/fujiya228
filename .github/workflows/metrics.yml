name: Profile Metrics

on:
  schedule: # daily at 02:00 UTC (11:00 JST)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Metrics 1
        uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          filename: metrics1.svg
          user: fujiya228
          base: header, activity, repositories, metadata
          config_timezone: Asia/Tokyo
          config_twemoji: yes
          # repositories_skipped: piscon2019,piscon2019-2,go-traq
          use_prebuilt_image: yes

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 2%

          plugin_lines: yes

          plugin_notable: yes
          plugin_notable_filter: stars:>100
          plugin_notable_from: organization
          plugin_notable_indepth: yes

      - name: Metrics 2
        uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          filename: metrics2.svg
          user: fujiya228
          base: ""
          config_timezone: Asia/Tokyo
          config_twemoji: yes  
          # repositories_skipped: piscon2019,piscon2019-2,go-traq
          use_prebuilt_image: yes

          # NOTE: plugin_habits and plugin_achievements removed — both error on the current
          # GitHub GraphQL schema (habits: TypeError 'author' of undefined; achievements:
          # GraphqlResponseError) and lowlighter/metrics is archived, so there's no upstream fix.
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
